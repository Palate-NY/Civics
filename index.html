function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function CivicsTrainer() {
  const [mode, setMode] = useState("home"); // home | study | mock | weak
  const [stats, setStats] = useState(() => {
    try { return JSON.parse(localStorage.getItem("civics-stats-v1")) || {}; }
    catch (e) { return {}; }
  });
  useEffect(() => {
    try { localStorage.setItem("civics-stats-v1", JSON.stringify(stats)); } catch (e) {}
  }, [stats]);

  function record(n, gotIt) {
    setStats((s) => {
      const cur = s[n] || { miss: 0, seen: 0 };
      return { ...s, [n]: { miss: cur.miss + (gotIt ? 0 : 1), seen: cur.seen + 1 } };
    });
  }

  return (
    <div style={{ minHeight: "100vh", background: PAPER, color: INK, fontFamily: "ui-sans-serif, system-ui, -apple-system, Helvetica, Arial, sans-serif" }}>
      <Header mode={mode} setMode={setMode} />
      <main className="mx-auto px-5 pb-24" style={{ maxWidth: 640 }}>
        {mode === "home" && <Home setMode={setMode} />}
        {mode === "study" && <Study record={record} />}
        {mode === "mock" && <Mock record={record} />}
        {mode === "weak" && <WeakSpots stats={stats} setMode={setMode} onReset={() => { if (confirm("Clear all saved progress on this device?")) setStats({}); }} />}
      </main>
    </div>
  );
}

function Header({ mode, setMode }) {
  return (
    <header style={{ background: INK, color: PAPER, position: "relative", overflow: "hidden" }}>
      <Guilloche />
      <div className="mx-auto px-5 py-5" style={{ maxWidth: 640, position: "relative" }}>
        <div className="flex items-center justify-between">
          <button onClick={() => setMode("home")} className="text-left" style={{ background: "none", border: "none", color: PAPER, cursor: "pointer", padding: 0 }}>
            <div style={{ fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase", color: GOLD, fontWeight: 600 }}>2025 Civics Test \u00B7 128 Questions</div>
            <div style={{ fontFamily: "ui-serif, Georgia, 'Times New Roman', serif", fontSize: 22, fontWeight: 600, marginTop: 2 }}>Naturalization Trainer</div>
          </button>
        </div>
        {mode !== "home" && (
          <div style={{ display: "flex", gap: 4, background: INK2, borderRadius: 999, padding: 3, marginTop: 14, width: "fit-content" }}>
            <Tab label="Study" active={mode === "study"} onClick={() => setMode("study")} />
            <Tab label="Mock" active={mode === "mock"} onClick={() => setMode("mock")} />
            <Tab label="Weak spots" active={mode === "weak"} onClick={() => setMode("weak")} />
          </div>
        )}
      </div>
    </header>
  );
}

function Tab({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{ border: "none", cursor: "pointer", borderRadius: 999, padding: "6px 14px", fontSize: 13, fontWeight: 600, background: active ? GOLD : "transparent", color: active ? INK : PAPER }}>
      {label}
    </button>
  );
}

function Guilloche() {
  return (
    <svg width="100%" height="100%" style={{ position: "absolute", inset: 0, opacity: 0.14 }} preserveAspectRatio="none">
      {Array.from({ length: 16 }).map((_, i) => (
        <path key={i} d={`M0 ${8 + i * 7} C 160 ${-14 + i * 7}, 320 ${34 + i * 7}, 640 ${6 + i * 7}`} fill="none" stroke={GOLD} strokeWidth="0.6" />
      ))}
    </svg>
  );
}

function Home({ setMode }) {
  return (
    <div style={{ paddingTop: 28 }}>
      <p style={{ fontFamily: "ui-serif, Georgia, serif", fontSize: 20, lineHeight: 1.4, color: INK }}>
        It\u2019s an <em>oral</em> test. The officer asks up to 20 questions from a pool of 128 \u2014 you pass at 12 correct. So train the way it\u2019s tested: read, say the answer out loud, then reveal.
      </p>

      <div style={{ marginTop: 24, display: "grid", gap: 12 }}>
        <ModeCard title="Study all 128" desc="One question at a time. Grade yourself honestly \u2014 anything you miss comes back until it sticks. Tap Back to review earlier answers." cta="Start studying" onClick={() => setMode("study")} />
        <ModeCard title="Mock interview" desc="20 random questions under the real rule: the officer stops at 12 right or 9 wrong. Pass/fail plus what you missed." cta="Take the mock" onClick={() => setMode("mock")} />
        <ModeCard title="Weak spots" desc="The questions you miss most, ranked \u2014 so your last review sessions hit only what needs work." cta="See weak spots" onClick={() => setMode("weak")} />
      </div>

      <div style={{ marginTop: 22, padding: 14, borderRadius: 10, background: CARD, border: "1px solid rgba(0,0,0,0.06)" }}>
        <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: GOLD, fontWeight: 700 }}>Filled in for you</div>
        <p style={{ fontSize: 14, lineHeight: 1.5, color: MUTE, marginTop: 6 }}>
          The 8 answers that depend on who\u2019s in office are set for <strong style={{ color: INK }}>Carroll Gardens (NY-10)</strong> and current as of July 2026. They\u2019re marked <VerifyPill /> in the deck. Reconfirm them the day before your interview \u2014 NY midterms are Nov 3, 2026.
        </p>
      </div>
    </div>
  );
}

function ModeCard({ title, desc, cta, onClick }) {
  return (
    <button onClick={onClick} style={{ textAlign: "left", cursor: "pointer", background: CARD, border: "1px solid rgba(0,0,0,0.08)", borderRadius: 12, padding: 18, width: "100%" }}>
      <div style={{ fontFamily: "ui-serif, Georgia, serif", fontSize: 19, fontWeight: 600, color: INK }}>{title}</div>
      <div style={{ fontSize: 14, lineHeight: 1.5, color: MUTE, marginTop: 6 }}>{desc}</div>
      <div style={{ marginTop: 12, display: "inline-block", fontSize: 13, fontWeight: 700, color: INK, borderBottom: `2px solid ${GOLD}`, paddingBottom: 2 }}>{cta} \u2192</div>
    </button>
  );
}

function VerifyPill() {
  return <span style={{ display: "inline-block", fontSize: 10, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: RED, border: `1px solid ${RED}`, borderRadius: 4, padding: "1px 5px" }}>verify</span>;
}

function CatChip({ n }) {
  const k = catKey(n);
  const c = CATS[k];
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 6, color: c.color, fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase" }}>
      <CatIcon k={k} size={15} color={c.color} />
      {c.label}
    </span>
  );
}

function QuestionCard({ item, revealed, onReveal }) {
  return (
    <div style={{ background: CARD, border: "1px solid rgba(0,0,0,0.08)", borderRadius: 14, padding: 22, minHeight: 220, display: "flex", flexDirection: "column" }}>
      <div className="flex items-center justify-between">
        <CatChip n={item.n} />
        {item.verify && <VerifyPill />}
      </div>
      <div style={{ fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace", fontSize: 11, color: MUTE, letterSpacing: "0.04em", marginTop: 10 }}>
        Q{String(item.n).padStart(3, "0")} / 128
      </div>
      <div style={{ fontFamily: "ui-serif, Georgia, serif", fontSize: 22, lineHeight: 1.35, fontWeight: 600, color: INK, marginTop: 6 }}>
        {item.q}
      </div>
      <div style={{ marginTop: "auto", paddingTop: 18 }}>
        {!revealed ? (
          <button onClick={onReveal} style={{ width: "100%", cursor: "pointer", background: INK, color: PAPER, border: "none", borderRadius: 10, padding: "13px 0", fontSize: 15, fontWeight: 600 }}>
            Reveal answer
          </button>
        ) : (
          <div style={{ borderTop: "1px solid rgba(0,0,0,0.1)", paddingTop: 14 }}>
            <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: GREEN, fontWeight: 700 }}>Answer</div>
            <div style={{ fontFamily: "ui-serif, Georgia, serif", fontSize: 20, fontWeight: 600, color: INK, marginTop: 4 }}>{item.a}</div>
            {item.alt && <div style={{ fontSize: 13, color: MUTE, marginTop: 8, lineHeight: 1.5 }}>{item.verify ? "" : "Also accepted: "}{item.alt}</div>}
          </div>
        )}
      </div>
    </div>
  );
}

// Read-only review of already-answered cards, newest first navigation.
function ReviewOverlay({ log, onClose }) {
  const [i, setI] = useState(log.length - 1);
  const entry = log[i];
  if (!entry) return null;
  const item = entry.item;
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(21,36,57,0.55)", display: "flex", alignItems: "center", justifyContent: "center", padding: 16, zIndex: 50 }}>
      <div style={{ background: PAPER, borderRadius: 16, padding: 18, width: "100%", maxWidth: 560 }}>
        <div className="flex items-center justify-between" style={{ marginBottom: 8 }}>
          <span style={{ fontSize: 12, fontWeight: 700, color: MUTE }}>Reviewing \u00B7 {i + 1} of {log.length}</span>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: INK, fontSize: 13, fontWeight: 700, textDecoration: "underline" }}>Resume</button>
        </div>
        <div style={{ background: CARD, border: "1px solid rgba(0,0,0,0.08)", borderRadius: 12, padding: 18 }}>
          <div className="flex items-center justify-between">
            <CatChip n={item.n} />
            <span style={{ fontSize: 11, fontWeight: 700, color: entry.gotIt ? GREEN : RED }}>{entry.gotIt ? "You: Got it" : "You: Missed"}</span>
          </div>
          <div style={{ fontFamily: "ui-serif, Georgia, serif", fontSize: 20, fontWeight: 600, marginTop: 10, lineHeight: 1.35 }}>{item.q}</div>
          <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: GREEN, fontWeight: 700, marginTop: 14 }}>Answer</div>
          <div style={{ fontFamily: "ui-serif, Georgia, serif", fontSize: 19, fontWeight: 600, marginTop: 3 }}>{item.a}</div>
          {item.alt && <div style={{ fontSize: 13, color: MUTE, marginTop: 6, lineHeight: 1.5 }}>{item.verify ? "" : "Also accepted: "}{item.alt}</div>}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 12 }}>
          <button disabled={i === 0} onClick={() => setI((x) => Math.max(0, x - 1))} style={navBtn(i === 0)}>\u2039 Older</button>
          <button disabled={i === log.length - 1} onClick={() => setI((x) => Math.min(log.length - 1, x + 1))} style={navBtn(i === log.length - 1)}>Newer \u203A</button>
        </div>
      </div>
    </div>
  );
}

function navBtn(disabled) {
  return { cursor: disabled ? "default" : "pointer", opacity: disabled ? 0.4 : 1, border: `1.5px solid ${INK}`, background: "transparent", color: INK, borderRadius: 10, padding: "11px 0", fontSize: 14, fontWeight: 700 };
}

function Study({ record }) {
  const [queue, setQueue] = useState(() => Q.map((x) => x.n));
  const [revealed, setRevealed] = useState(false);
  const [known, setKnown] = useState(() => new Set());
  const [log, setLog] = useState([]); // {item, gotIt}
  const [reviewing, setReviewing] = useState(false);
  const [onlyVerify, setOnlyVerify] = useState(false);

  const verifyQueue = useMemo(() => Q.filter((x) => x.verify).map((x) => x.n), []);
  const active = onlyVerify ? verifyQueue : queue;
  const currentN = active[0];
  const item = Q.find((x) => x.n === currentN);

  function grade(gotIt) {
    record(currentN, gotIt);
    setLog((l) => [...l, { item, gotIt }]);
    if (onlyVerify) { setRevealed(false); setQueueRotateVerify(); return; }
    setKnown((k) => { const nk = new Set(k); gotIt ? nk.add(currentN) : nk.delete(currentN); return nk; });
    setQueue((qq) => {
      const rest = qq.slice(1);
      if (!gotIt) rest.splice(Math.min(rest.length, 3), 0, currentN); // resurface soon
      return rest.length ? rest : Q.map((x) => x.n);
    });
    setRevealed(false);
  }

  // rotate verify list so drilling the 8 cycles
  const [vRot, setVRot] = useState(0);
  function setQueueRotateVerify() { setVRot((r) => (r + 1) % verifyQueue.length); }
  const verifyItem = Q.find((x) => x.n === verifyQueue[vRot]);
  const shownItem = onlyVerify ? verifyItem : item;

  if (!shownItem) return null;

  return (
    <div style={{ paddingTop: 20 }}>
      <ProgressBar value={known.size} total={Q.length} label={onlyVerify ? "Drilling the 8 verify answers" : `${known.size} of ${Q.length} marked known`} />

      <div className="flex items-center justify-between" style={{ marginTop: 14, marginBottom: 10 }}>
        <button disabled={log.length === 0} onClick={() => setReviewing(true)} style={{ background: "none", border: "none", cursor: log.length ? "pointer" : "default", opacity: log.length ? 1 : 0.4, color: INK, fontSize: 13, fontWeight: 700 }}>
          \u2039 Back / review
        </button>
        <span style={{ fontSize: 12, color: MUTE }}>{log.length} answered</span>
      </div>

      <QuestionCard item={shownItem} revealed={revealed} onReveal={() => setRevealed(true)} />

      {revealed && !onlyVerify && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 12 }}>
          <button onClick={() => grade(false)} style={gradeBtn(RED, false)}>Missed it</button>
          <button onClick={() => grade(true)} style={gradeBtn(GREEN, true)}>Got it</button>
        </div>
      )}
      {revealed && onlyVerify && (
        <button onClick={() => { setLog((l) => [...l, { item: verifyItem, gotIt: true }]); setRevealed(false); setQueueRotateVerify(); }} style={{ ...gradeBtn(INK, true), marginTop: 12, width: "100%" }}>Next \u2192</button>
      )}

      <div style={{ marginTop: 18, display: "flex", justifyContent: "center" }}>
        <button onClick={() => { setOnlyVerify((v) => !v); setRevealed(false); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 13, color: MUTE, textDecoration: "underline" }}>
          {onlyVerify ? "\u2190 Back to all 128" : "Drill just the 8 verify answers"}
        </button>
      </div>

      {reviewing && <ReviewOverlay log={log} onClose={() => setReviewing(false)} />}
    </div>
  );
}

function gradeBtn(color, filled) {
  return { cursor: "pointer", border: `1.5px solid ${color}`, background: filled ? color : "transparent", color: filled ? PAPER : color, borderRadius: 10, padding: "13px 0", fontSize: 15, fontWeight: 700 };
}

function ProgressBar({ value, total, label }) {
  const pct = Math.round((value / total) * 100);
  return (
    <div>
      <div className="flex items-center justify-between" style={{ fontSize: 12, color: MUTE, marginBottom: 6 }}>
        <span>{label}</span>
        <span style={{ fontFamily: "ui-monospace, monospace" }}>{pct}%</span>
      </div>
      <div style={{ height: 6, background: "rgba(0,0,0,0.08)", borderRadius: 999 }}>
        <div style={{ height: "100%", width: `${pct}%`, background: GOLD, borderRadius: 999, transition: "width 0.3s" }} />
      </div>
    </div>
  );
}

function Mock({ record }) {
  const [session, setSession] = useState(() => shuffle(Q).slice(0, 20));
  const [idx, setIdx] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const [correct, setCorrect] = useState(0);
  const [wrong, setWrong] = useState(0);
  const [log, setLog] = useState([]); // {item, gotIt}
  const [reviewing, setReviewing] = useState(false);
  const [done, setDone] = useState(false);

  function reset() { setSession(shuffle(Q).slice(0, 20)); setIdx(0); setRevealed(false); setCorrect(0); setWrong(0); setLog([]); setDone(false); }

  function grade(gotIt) {
    record(session[idx].n, gotIt);
    const nc = correct + (gotIt ? 1 : 0);
    const nw = wrong + (gotIt ? 0 : 1);
    setCorrect(nc); setWrong(nw);
    setLog((l) => [...l, { item: session[idx], gotIt }]);
    if (nc >= 12 || nw >= 9 || idx + 1 >= session.length) setDone(true);
    else { setIdx((i) => i + 1); setRevealed(false); }
  }

  if (done) {
    const passed = correct >= 12;
    const missed = log.filter((e) => !e.gotIt).map((e) => e.item);
    return (
      <div style={{ paddingTop: 28 }}>
        <div style={{ background: CARD, border: "1px solid rgba(0,0,0,0.08)", borderRadius: 14, padding: 24, textAlign: "center" }}>
          <div style={{ fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase", color: passed ? GREEN : RED, fontWeight: 700 }}>{passed ? "Pass" : "Not yet"}</div>
          <div style={{ fontFamily: "ui-serif, Georgia, serif", fontSize: 40, fontWeight: 700, color: INK, marginTop: 8 }}>{correct}<span style={{ fontSize: 22, color: MUTE }}> correct</span></div>
          <div style={{ fontSize: 14, color: MUTE, marginTop: 4 }}>{passed ? "You reached 12 \u2014 the officer would stop here." : `${wrong} wrong. It takes 9 wrong to fail; 12 right to pass.`}</div>
          <button onClick={reset} style={{ marginTop: 20, cursor: "pointer", background: INK, color: PAPER, border: "none", borderRadius: 10, padding: "12px 28px", fontSize: 15, fontWeight: 600 }}>New mock</button>
        </div>
        {missed.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: MUTE, fontWeight: 700, marginBottom: 10 }}>Review what you missed</div>
            <div style={{ display: "grid", gap: 10 }}>
              {missed.map((m) => (
                <div key={m.n} style={{ background: CARD, border: "1px solid rgba(0,0,0,0.08)", borderRadius: 10, padding: 14 }}>
                  <CatChip n={m.n} />
                  <div style={{ fontSize: 15, fontWeight: 600, color: INK, lineHeight: 1.4, marginTop: 6 }}>{m.q}</div>
                  <div style={{ fontSize: 14, color: GREEN, fontWeight: 600, marginTop: 6 }}>{m.a}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{ paddingTop: 20 }}>
      <div className="flex items-center justify-between" style={{ fontSize: 12, color: MUTE, marginBottom: 12 }}>
        <span style={{ fontFamily: "ui-monospace, monospace" }}>Question {idx + 1} of {session.length}</span>
        <span><span style={{ color: GREEN, fontWeight: 700 }}>{correct} right</span>{"  \u00B7  "}<span style={{ color: RED, fontWeight: 700 }}>{wrong} wrong</span></span>
      </div>

      <div className="flex items-center justify-between" style={{ marginBottom: 10 }}>
        <button disabled={log.length === 0} onClick={() => setReviewing(true)} style={{ background: "none", border: "none", cursor: log.length ? "pointer" : "default", opacity: log.length ? 1 : 0.4, color: INK, fontSize: 13, fontWeight: 700 }}>\u2039 Back / review</button>
      </div>

      <QuestionCard item={session[idx]} revealed={revealed} onReveal={() => setRevealed(true)} />

      {revealed && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 12 }}>
          <button onClick={() => grade(false)} style={gradeBtn(RED, false)}>Missed it</button>
          <button onClick={() => grade(true)} style={gradeBtn(GREEN, true)}>Got it</button>
        </div>
      )}

      <div style={{ marginTop: 16, textAlign: "center", fontSize: 12, color: MUTE }}>Stops at 12 right (pass) or 9 wrong (fail).</div>

      {reviewing && <ReviewOverlay log={log} onClose={() => setReviewing(false)} />}
    </div>
  );
}

function WeakSpots({ stats, setMode, onReset }) {
  const rows = useMemo(() => {
    return Object.entries(stats)
      .map(([n, s]) => ({ item: Q.find((x) => x.n === Number(n)), ...s }))
      .filter((r) => r.item && r.miss > 0)
      .sort((a, b) => b.miss - a.miss || b.miss / b.seen - a.miss / a.seen);
  }, [stats]);

  const totalSeen = Object.values(stats).reduce((s, x) => s + x.seen, 0);
  const totalMiss = Object.values(stats).reduce((s, x) => s + x.miss, 0);

  if (rows.length === 0) {
    return (
      <div style={{ paddingTop: 40, textAlign: "center" }}>
        <div style={{ display: "inline-flex", padding: 14, borderRadius: 999, background: CARD, border: "1px solid rgba(0,0,0,0.08)" }}>
          <CatIcon k="rights" size={26} color={GOLD} />
        </div>
        <div style={{ fontFamily: "ui-serif, Georgia, serif", fontSize: 20, fontWeight: 600, marginTop: 14 }}>No weak spots yet</div>
        <p style={{ fontSize: 14, color: MUTE, marginTop: 6, lineHeight: 1.5 }}>Run a study round or a mock. Anything you mark <em>Missed</em> collects here, ranked, so your final review hits only what needs work.</p>
        <button onClick={() => setMode("mock")} style={{ marginTop: 18, cursor: "pointer", background: INK, color: PAPER, border: "none", borderRadius: 10, padding: "12px 24px", fontSize: 15, fontWeight: 600 }}>Take a mock</button>
      </div>
    );
  }

  return (
    <div style={{ paddingTop: 22 }}>
      <div style={{ fontFamily: "ui-serif, Georgia, serif", fontSize: 22, fontWeight: 600 }}>Weak spots</div>
      <div style={{ fontSize: 13, color: MUTE, marginTop: 4 }}>{totalMiss} misses across {totalSeen} answers, saved on this device. Ranked by how often you miss each one.</div>
      <button onClick={onReset} style={{ marginTop: 8, background: "none", border: "none", cursor: "pointer", color: RED, fontSize: 12, fontWeight: 700, textDecoration: "underline", padding: 0 }}>Reset saved progress</button>

      <div style={{ display: "grid", gap: 10, marginTop: 16 }}>
        {rows.map((r) => (
          <div key={r.item.n} style={{ background: CARD, border: "1px solid rgba(0,0,0,0.08)", borderRadius: 12, padding: 16, borderLeft: `4px solid ${CATS[catKey(r.item.n)].color}` }}>
            <div className="flex items-center justify-between">
              <CatChip n={r.item.n} />
              <span style={{ fontSize: 12, fontWeight: 700, color: RED }}>missed {r.miss} / {r.seen}</span>
            </div>
            <div style={{ fontSize: 15, fontWeight: 600, color: INK, lineHeight: 1.4, marginTop: 8 }}>{r.item.q}</div>
            <div style={{ fontSize: 15, color: GREEN, fontWeight: 600, marginTop: 6 }}>{r.item.a}</div>
            {r.item.alt && <div style={{ fontSize: 13, color: MUTE, marginTop: 5, lineHeight: 1.5 }}>{r.item.verify ? "" : "Also accepted: "}{r.item.alt}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<CivicsTrainer />);
</script>
</body>
</html>
