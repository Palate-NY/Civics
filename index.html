  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ht: 800;\n  font-display: swap;\n  src: url(\"a82c0ba6-5604-42f2-b28c-330fe675cb8e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body { margin: 0; background: #f3efe7; font-family: 'Outfit', system-ui, sans-serif; }\n  a { color: #1e3a6e; } a:hover { color: #8c3a2b; }\n  @keyframes popIn { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }\n  @keyframes slideUp { from { transform: translateY(14px); opacity: 0; } to { transform: none; opacity: 1; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; display: flex; justify-content: center; background: linear-gradient(180deg, #E5E9FFEB, #E3F2FFEB)\">\n<div style=\"width:100%;max-width:480px;padding:0 20px 40px;box-sizing:border-box\">\n\n<!-- ============ HOME ============ -->\n<sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"display:flex;flex-direction:column;gap:20px;padding-top:28px\">\n    <div style=\"display:flex;background:#e9e2d2;border-radius:14px;padding:4px;gap:4px\">\n      <button onclick=\"{{ onBastien }}\" style=\"flex:1;border:none;border-radius:11px;padding:11px 8px;font-family:inherit;font-size:17px;font-weight:700;cursor:pointer;background:{{ bBg }};color:{{ bColor }};transition:all .15s ease\">🧔 Bastien<\u002Fbutton>\n      <button onclick=\"{{ onValentine }}\" style=\"flex:1;border:none;border-radius:11px;padding:11px 8px;font-family:inherit;font-size:17px;font-weight:700;cursor:pointer;background:{{ vBg }};color:{{ vColor }};transition:all .15s ease\">👩 Valentine<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between\">\n      <div style=\"display:flex;flex-direction:column;gap:2px\">\n        <div style=\"font-size:15px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#8c3a2b\">Road to Citizenship<\u002Fdiv>\n        <div style=\"font-size:33px;font-weight:800;color:#1b2233;line-height:1.1\">Civics Trainer<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:8px\">\n        <div title=\"Day streak\" style=\"display:flex;align-items:center;gap:5px;background:#fff;border:1px solid #e3dccb;border-radius:999px;padding:7px 12px;font-weight:700;color:#b3542c;font-size:18px\">🔥 {{ streak }}<\u002Fdiv>\n        <div title=\"Level\" style=\"display:flex;align-items:center;gap:5px;background:#1e3a6e;border-radius:999px;padding:7px 12px;font-weight:700;color:#fff;font-size:18px\">⭐ {{ level }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;gap:18px;background:#fff;border:1px solid #e3dccb;border-radius:18px;padding:18px 20px;box-shadow:0 2px 8px rgba(60,45,20,.05)\">\n      <div style=\"width:86px;height:86px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;background:conic-gradient(#c8a24a {{ overallDeg }}deg, #eee6d4 0deg)\">\n        <div style=\"width:66px;height:66px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n          <div style=\"font-size:22px;font-weight:800;color:#1b2233\">{{ overallPct }}%<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:4px\">\n        <div style=\"font-size:19px;font-weight:700;color:#1b2233\">{{ masteredCount }} of {{ totalCount }} mastered<\u002Fdiv>\n        <div style=\"font-size:16px;color:#6b6355;line-height:1.4\">Answer a question right 3 times to master it. {{ encourage }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <button onclick=\"{{ onQuickQuiz }}\" style=\"display:flex;align-items:center;justify-content:center;gap:10px;background:#8c3a2b;color:#fff;border:none;border-radius:16px;padding:17px;font-family:inherit;font-size:21px;font-weight:70 rp.color }}\">{{ grp.pct }}%<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:7px;border-radius:99px;background:#efe9db;overflow:hidden\"><div style=\"height:100%;border-radius:99px;background:{{ grp.color }};width:{{ grp.pct }}%;transition:width .4s ease\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:8px\">\n          <button onclick=\"{{ grp.onStudy }}\" style=\"flex:1;background:{{ grp.tint }};color:{{ grp.color }};border:none;border-radius:10px;padding:10px;font-family:inherit;font-size:17px;font-weight:700;cursor:pointer\" style-hover=\"filter:brightness(.96)\">🃏 Flashcards<\u002Fbutton>\n          <button onclick=\"{{ grp.onQuiz }}\" style=\"flex:1;background:#fff;color:#1b2233;border:1.5px solid #e3dccb;border-radius:10px;padding:10px;font-family:inherit;font-size:17px;font-weight:700;cursor:pointer\" style-hover=\"background:#faf7f0\">⚡ Quiz me<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n\n    <div style=\"font-size:14px;color:#a49a86;text-align:center;line-height:1.5;margin-top:6px\">Some answers (President, Governor, Speaker…) change over time — always confirm at <a href=\"https://www.uscis.gov/citizenship/testupdates\" target=\"_blank\" style=\"color:#8c3a2b;font-weight:600\">uscis.gov<\u002Fa> before your interview.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ STUDY (flashcards) ============ -->\n<sc-if value=\"{{ isStudy }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"display:flex;flex-direction:column;gap:16px;padding-top:24px\">\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <button onclick=\"{{ onHome }}\" style=\"background:#fff;border:1px solid #e3dccb;border-radius:10px;width:38px;height:38px;font-size:19px;cursor:pointer;color:#1b2233\" style-hover=\"background:#faf7f0\">←<\u002Fbutton>\n      <div style=\"display:flex;flex-direction:column\">\n        <div style=\"font-size:19px;font-weight:700;color:#1b2233\">{{ studyName }}<\u002Fdiv>\n        <div style=\"font-size:15px;color:#8a8171\">Card {{ studyPos }} of {{ studyTotal }} · tap card to flip<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div onclick=\"{{ onFlip }}\" style=\"position:relative;background:#fff;border:1px solid #e3dccb;border-radius:22px;min-height:340px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px 26px;box-sizing:border-box;cursor:pointer;box-shadow:0 6px 18px rgba(60,45,20,.08);text-align:center;animation:popIn .22s ease both\" style-hover=\"box-shadow:0 8px 22px rgba(60,45,20,.12)\">\n      <div style=\"position:absolute;top:14px;left:16px;font-size:14px;font-weight:700;color:#a49a86\">#{{ cardId }}<\u002Fdiv>\n      <div style=\"position:absolute;top:14px;right:16px;font-size:15px;letter-spacing:2px;color:#c8a24a\">{{ cardStars }}<\u002Fdiv>\n      <div style=\"font-size:76px;line-height:1\">{{ cardIcon }}<\u002Fdiv>\n      <sc-if value=\"{{ cardFront }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-size:25px;font-weight:700;color:#1b2233;line-height:1.35;text-wrap:pretty\">{{ cardQ }}<\u002Fdiv>\n        <div style=\"font-size:15px;font-weight:600;color:#a49a86;letter-spacing:.08em;text-transform:uppercase\">Tap to reveal answer<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ cardBack }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:27px;font-weight:800;color:#1e3a6e;line-height:1.3;text-wrap:pretty\">{{ cardA }}<\u002Fdiv>\n        <sc-if value=\"{{ cardHasMore }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:16px;color:#6b6355;line-height:1.5;text-wrap:pretty\"><span style=\"font-weight:700;color:#8a8171\">Also accepted:<\u002Fspan> {{ cardMore }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;gap:10px\">\n      <button onclick=\"{{ onPrev }}\" style=\"flex:1;background:#fff;border:1.5px solid #e3dccb;border-radius:12px;padding:14px;font-family:inherit;font-size:18px;font-weight:700;color:#1b2233;cursor:pointer\" style-hover=\"background:#faf7f0\">← Previous<\u002Fbutton>\n      <button onclick=\"{{ onNext }}\" style=\"flex:1;background:#1e3a6e;border:none;border-radius:12px;padding:14px;font-family:inherit;font-size:18px;font-weight:700;color:#fff;cursor:pointer\" style-hover=\"background:#27498a\">Next →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ QUIZ ============ -->\n<sc-if value=\"{{ isQuiz }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"display:flex;flex-direction:column;gap:16px;padding-top:24px\">\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <button onclick=\"{{ onHome }}\" style=\"background:#fff;border:1px solid #e3dccb;border-radius:10px;width:38px;height:38px;font-size:19px;cursor:pointer;color:#1b2233\" style-hover=\"background:#faf7f0\">✕<\u002Fbutton>\n      <div style=\"flex:1;height:10px;border-radius:99px;background:#e7e0d0;overflow:hidden\"><div style=\"height:100%;border-radius:99px;background:linear-gradient(90deg,#8c3a2b,#c8a24a);width:{{ quizPct }}%;transition:width .35s ease\"><\u002Fdiv><\u002Fdiv>\n      <div style=\"font-size:17px;font-weight:700;color:#8a8171\">{{ quizPos }}/{{ quizTotal }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ isTest }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;justify-content:center;gap:16px;font-size:16px;font-weight:700\">\n        <span style=\"color:#2b6e4f\">✓ {{ tallyOk }} correct · need 12<\u002Fspan>\n        <span style=\"color:#8c3a2b\">✗ {{ tallyNo }} wrong · 9 ends it<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"background:#fff;border:1px solid #e3dccb;border-radius:20px;padding:26px 24px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;box-shadow:0 4px 14px rgba(60,45,20,.06);animation:popIn .2s ease both\">\n      <div style=\"font-size:61px;line-height:1\">{{ qIcon }}<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;color:#1b2233;line-height:1.35;text-wrap:pretty\">{{ qText }}<\u002Fdiv>\n      <div style=\"font-size:14px;font-weight:600;color:#a49a86;letter-spacing:2px\">{{ qStars }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ qIsChoice }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <sc-for list=\"{{ choices }}\" as=\"c\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ c.onPick }}\" style=\"display:flex;align-items:center;gap:10px;text-align:left;background:{{ c.bg }};border:2px solid {{ c.border }};border-radius:14px;padding:14px 16px;font-family:inherit;font-size:18px;font-weight:600;color:{{ c.color }};cursor:pointer;line-height:1.35;transition:all .15s ease\" style-hover=\"border-color:#c8b78f\">\n            <span style=\"flex:none;font-size:20px\">{{ c.mark }}<\u002Fspan>\n            <span>{{ c.text }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ qIsSelf }}\" hint-placeholder-val=\"{{ false }}\">\n      <sc-if value=\"{{ selfHidden }}\" hint-placeholder-val=\"{{ true }}\">\n        <button onclick=\"{{ onReveal }}\" style=\"background:#1e3a6e;color:#fff;border:none;border-radius:14px;padding:16px;font-family:inherit;font-size:19px;font-weight:700;cursor:pointer\" style-hover=\"background:#27498a\">Say it out loud, then reveal the answer<\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ selfShown }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#e7edf7;border:1.5px solid #c6d2e8;border-radius:14px;padding:16px 18px;text-align:center\">\n          <div style=\"font-size:21px;font-weight:800;color:#1e3a6e\">{{ qAnswer }}<\u002Fdiv>\n          <sc-if value=\"{{ qHasMore }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:15px;color:#5a6578;margin-top:6px;line-height:1.45\">{{ qMore }}<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px\">\n          <button onclick=\"{{ onSelfNo }}\" style=\"flex:1;background:#fff;border:2px solid #dcc3bd;color:#8c3a2b;border-radius:12px;padding:13px;font-family:inherit;font-size:18px;font-weight:700;cursor:pointer\" style-hover=\"background:#f9f1ef\">Still learning<\u002Fbutton>\n          <button onclick=\"{{ onSelfYes }}\" style=\"flex:1;background:#2b6e4f;border:none;color:#fff;border-radius:12px;padding:13px;font-family:inherit;font-size:18px;font-weight:700;cursor:pointer\" style-hover=\"background:#337e5b\">I knew it ✓<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showFeedback }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:12px;animation:slideUp .25s ease both\">\n        <div style=\"border-radius:14px;padding:14px 18px;display:flex;align-items:flex-start;gap:12px;background:{{ fbBg }};border:1.5px solid {{ fbBorder }}\">\n          <div style=\"font-size:26px;line-height:1.2\">{{ fbEmoji }}<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\">\n            <div style=\"font-size:18px;font-weight:800;color:{{ fbColor }}\">{{ fbTitle }}<\u002Fdiv>\n            <div style=\"font-size:16px;color:#4d4638;line-height:1.45;text-wrap:pretty\">{{ fbDetail }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ onNextQ }}\" style=\"background:#1b2233;color:#fff;border:none;border-radius:14px;padding:15px;font-family:inherit;font-size:19px;font-weight:700;cursor:pointer\" style-hover=\"background:#2a3550\">{{ nextLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ RESULTS ============ -->\n<sc-if value=\"{{ isResult }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"display:flex;flex-direction:column;gap:18px;padding-top:40px;text-align:center\">\n    <div style=\"font-size:83px;animation:popIn .35s ease both\">{{ resEmoji }}<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:6px\">\n      <div style=\"font-size:32px;font-weight:800;color:#1b2233\">{{ resTitle }}<\u002Fdiv>\n      <div style=\"font-size:18px;color:#6b6355;line-height:1.5\">{{ resSub }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;justify-content:center\">\n      <div style=\"background:#fff;border:1px solid #e3dccb;border-radius:14px;padding:14px 20px;min-width:76px\"><div style=\"font-size:26px;font-weight:800;color:#2b6e4f\">{{ resScore }}<\u002Fdiv><div style=\"font-size:14px;font-weight:600;color:#8a8171\">correct<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e3dccb;border-radius:14px;padding:14px 20px;min-width:76px\"><div style=\"font-size:26px;font-weight:800;color:#c8a24a\">+{{ resXp }}<\u002Fdiv><div style=\"font-size:14px;font-weight:600;color:#8a8171\">XP<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e3dccb;border-radius:14px;padding:14px 20px;min-width:76px\"><div style=\"font-size:26px;font-weight:800;color:#b3542c\">🔥 {{ streak }}<\u002Fdiv><div style=\"font-size:14px;font-weight:600;color:#8a8171\">streak<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ hasMissed }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:8px;text-align:left\">\n        <div style=\"font-size:15px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#8a8171;margin-top:6px\">Review these<\u002Fdiv>\n        <sc-for list=\"{{ missed }}\" as=\"m\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #ecd9d4;border-radius:14px;padding:12px 14px\">\n            <div style=\"font-size:31px;flex:none\">{{ m.icon }}<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:2px;min-width:0\">\n              <div style=\"font-size:16px;font-weight:600;color:#1b2233;line-height:1.3\">{{ m.q }}<\u002Fdiv>\n              <div style=\"font-size:15px;font-weight:700;color:#8c3a2b\">{{ m.a }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"display:flex;gap:10px;margin-top:6px\">\n      <button onclick=\"{{ onHome }}\" style=\"flex:1;background:#fff;border:1.5px solid #e3dccb;border-radius:14px;padding:15px;font-family:inherit;font-size:18px;font-weight:700;color:#1b2233;cursor:pointer\" style-hover=\"background:#faf7f0\">Home<\u002Fbutton>\n      <button onclick=\"{{ onQuickQuiz }}\" style=\"flex:1;background:#8c3a2b;border:none;border-radius:14px;padding:15px;font-family:inherit;font-size:18px;font-weight:700;color:#fff;cursor:pointer\" style-hover=\"background:#9c452f\">Play again 🎯<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;quizLength&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:20,&quot;min&quot;:5,&quot;max&quot;:20,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Quiz&quot;},&quot;includeVarying&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Quiz&quot;,&quot;description&quot;:&quot;Include questions whose answers vary (President, Governor, etc.) as say-aloud self-check cards&quot;},&quot;focusWeak&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Quiz&quot;,&quot;description&quot;:&quot;Prioritize questions you haven't mastered yet&quot;}}\">\nclass Component extends DCLogic {\n  state = { loaded: false, screen: \"home\", studyGroup: null, studyIdx: 0, flipped: false,\n    quiz: null, progressTick: 0 };\n\n  componentDidMount() {\n    import(window.__resources.civicsData).then((m) => {\n      this.bank = m;\n      let u = \"Bastien\";\n      try { u = localStorage.getItem(\"civics-user\") || \"Bastien\"; } catch (e) {}\n      this.setState({ loaded: true, user: u });\n    });\n  }\n\n  get Q() { return this.bank.QUESTIONS; }\n  get G() { return this.bank.GROUPS; }\n  storageKey() { return \"civics-trainer-2025:\" + (this.state.user || \"Bastien\"); }\n  get p() {\n    const k = this.storageKey();\n    if (this._pk !== k) {\n      let p = null;\n      try { p = JSON.parse(localStorage.getItem(k)); } catch (e) {}\n      if (!p && (this.state.user || \"Bastien\") === \"Bastien\") {\n        try { p = JSON.parse(localStorage.getItem(\"civics-trainer-2025\")); } catch (e) {}\n      }\n      this._p = p || { mastery: {}, xp: 0, streak: 0, lastDay: null };\n      this._pk = k;\n    }\n    return this._p;\n  }\n  save() { localStorage.setItem(this.storageKey(), JSON.stringify(this.p)); }\n\n  mastery(id) { return this.p.mastery[id] || 0; }\n  stars(id) { const m = this.mastery(id); return \"★\".repeat(m) + \"☆\".repeat(3 - m); }\n\n  quizLen() { return Math.round(this.props.quizLength ?? 20); }\n  includeVarying() { return this.props.includeVarying ?? true; }\n  focusWeak() { return this.props.focusWeak ?? true; }\n\n  shuffle(arr) { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }\n\n  buildChoices(q) {\n    const pool = this.shuffle(this.Q.filter((o) => o.g === q.g && o.id !== q.id && !o.dyn && o.a !== q.a));\n    const seen = new Set([q.a]);\n    const wrong = [];\n    for (const o of pool) { if (!seen.has(o.a)) { seen.add(o.a); wrong.push(o.a); } if (wrong.length === 3) break; }\n    return this.shuffle([q.a, ...wrong]);\n  }\n\n  startQuiz(groupKey) {\n    let pool = this.Q.filter((q) => (!groupKey || q.g === groupKey) && (this.includeVarying() || !q.dyn));\n    let list = this.shuffle(pool);\n    if (this.focusWeak()) list.sort((a, b) => (this.mastery(a.id) + Math.random() * 1.6) - (this.mastery(b.id) + Math.random() * 1.6));\n    list = list.slice(0, Math.min(this.quizLen(), list.length));\n    const items = list.map((q) => ({ q, choices: q.dyn ? null : this.buildChoices(q) }));\n    this.setState({ screen: \"quiz\", quiz: { items, idx: 0, picked: null, correct: null, revealed: false, score: 0, xp: 0, missed: [] } });\n  }\n\n  startTest() {\n    const items = this.shuffle(this.Q).slice(0, 20).map((q) => ({ q, choices: null }));\n    this.setState({ screen: \"quiz\", quiz: { mode: \"test\", items, idx: 0, picked: null, correct: null, revealed: false, score: 0, xp: 0, missed: [] } });\n  }\n\n  answer(text) {\n    const qz = this.state.quiz;\n    if (qz.picked !== null) return;\n    const cur = qz.items[qz.idx].q;\n    const ok = text === cur.a;\n    this.grade(cur, ok);\n    this.setState({ quiz: { ...qz, picked: text, correct: ok, score: qz.score + (ok ? 1 : 0), xp: qz.xp + (ok ? 10 : 2), missed: ok ? qz.missed : [...qz.missed, cur] } });\n  }\n\n  selfGrade(ok) {\n    const qz = this.state.quiz;\n    const cur = qz.items[qz.idx].q;\n    this.grade(cur, ok);\n    this.setState({ quiz: { ...qz, picked: ok ? cur.a : \"__no__\", correct: ok, score: qz.score + (ok ? 1 : 0), xp: qz.xp + (ok ? 10 : 2), missed: ok ? qz.missed : [...qz.missed, cur] } });\n  }\n\n  grade(q, ok) {\n    const m = this.mastery(q.id);\n    this.p.mastery[q.id] = ok ? Math.min(3, m + 1) : Math.max(0, m - 1);\n  }\n\n  nextQ() {\n    const qz = this.state.quiz;\n    const testOver = qz.mode === \"test\" && (qz.score >= 12 || qz.missed.length >= 9);\n    if (!testOver && qz.idx + 1 < qz.items.length) {\n      this.setState({ quiz: { ...qz, idx: qz.idx + 1, picked: null, correct: null, revealed: false } });\n    } else {\n      const today = new Date().toDateString();\n      const yesterday = new Date(Date.now() - 864e5).toDateString();\n      if (this.p.lastDay !== today) {\n        this.p.streak = this.p.lastDay === yesterday ? this.p.streak + 1 : 1;\n        this.p.lastDay = today;\n      }\n      this.p.xp += qz.xp;\n      this.save();\n      this.setState({ screen: \"result\" });\n    }\n  }\n\n  renderVals() {\n    if (!this.state.loaded) return { isHome: false, isStudy: false, isQuiz: false, isResult: false };\n    const s = this.state;\n    const goHome = () => this.setState({ screen: \"home\", quiz: s.screen === \"quiz\" ? null : s.quiz });\n\n    const vals = {\n      isHome: s.screen === \"home\", isStudy: s.screen === \"study\", isQuiz: s.screen === \"quiz\", isResult: s.screen === \"result\",\n      onHome: goHome,\n      onQuickQuiz: () => this.startQuiz(null),\n      onTakeTest: () => this.startTest(),\n      streak: this.p.streak,\n      quizLenLabel: this.quizLen(),\n    };\n\n    // HOME\n    const totalM = this.Q.reduce((n, q) => n + this.mastery(q.id), 0);\n    vals.overallPct = Math.round((totalM / (this.Q.length * 3)) * 100);\n    vals.overallDeg = Math.round(vals.overallPct * 3.6);\n    vals.masteredCount = this.Q.filter((q) => this.mastery(q.id) === 3).length;\n    vals.totalCount = this.Q.length;\n    const setU = (u) => { try { localStorage.setItem(\"civics-user\", u); } catch (e) {} this.setState({ user: u, screen: \"home\", quiz: null }); };\n    vals.onBastien = () => setU(\"Bastien\");\n    vals.onValentine = () => setU(\"Valentine\");\n    const isB = (this.state.user || \"Bastien\") !== \"Valentine\";\n    vals.bBg = isB ? \"#1e3a6e\" : \"transparent\"; vals.bColor = isB ? \"#ffffff\" : \"#6b6355\";\n    vals.vBg = isB ? \"transparent\" : \"#8c3a2b\"; vals.vColor = isB ? \"#6b6355\" : \"#ffffff\";\n\n    vals.level = Math.floor(this.p.xp / 100) + 1;\n    vals.encourage = vals.masteredCount === 0 ? \"Every expert started at zero — let's go!\" : vals.masteredCount < vals.totalCount / 2 ? \"Keep the streak alive!\" : vals.masteredCount < vals.totalCount ? \"You're more than halfway there!\" : \"You're ready. Go get that certificate! 🎉\";\n    vals.groups = Object.keys(this.G).map((key) => {\n      const g = this.G[key];\n      const qs = this.Q.filter((q) => q.g === key);\n      const gm = qs.reduce((n, q) => n + this.mastery(q.id), 0);\n      return {\n        name: g.name, icon: g.icon, color: g.color, tint: g.tint,\n        count: qs.length,\n        mastered: qs.filter((q) => this.mastery(q.id) === 3).length,\n        pct: Math.round((gm / (qs.length * 3)) * 100),\n        onStudy: () => this.setState({ screen: \"study\", studyGroup: key, studyIdx: 0, flipped: false }),\n        onQuiz: () => this.startQuiz(key),\n      };\n    });\n\n    // STUDY\n    if (s.screen === \"study\" && s.studyGroup) {\n      const g = this.G[s.studyGroup];\n      const qs = this.Q.filter((q) => q.g === s.studyGroup);\n      const card = qs[s.studyIdx];\n      vals.studyName = g.name;\n      vals.studyPos = s.studyIdx + 1;\n      vals.studyTotal = qs.length;\n      vals.cardId = card.id;\n      vals.cardIcon = card.icon;\n      vals.cardStars = this.stars(card.id);\n      vals.cardQ = card.q;\n      vals.cardA = card.a;\n      vals.cardMore = card.more;\n      vals.cardHasMore = !!card.more;\n      vals.cardFront = !s.flipped;\n      vals.cardBack = s.flipped;\n      vals.onFlip = () => this.setState({ flipped: !s.flipped });\n      vals.onNext = (e) => { e.stopPropagation(); this.setState({ studyIdx: (s.studyIdx + 1) % qs.length, flipped: false }); };\n      vals.onPrev = (e) => { e.stopPropagation(); this.setState({ studyIdx: (s.studyIdx - 1 + qs.length) % qs.length, flipped: false }); };\n    }\n\n    // QUIZ\n    if (s.screen === \"quiz\" && s.quiz) {\n      const qz = s.quiz;\n      const item = qz.items[qz.idx];\n      const cur = item.q;\n      const answered = qz.picked !== null;\n      vals.quizPos = qz.idx + 1;\n      vals.quizTotal = qz.items.length;\n      vals.quizPct = Math.round(((qz.idx + (answered ? 1 : 0)) / qz.items.length) * 100);\n      vals.qIcon = cur.icon;\n      vals.qText = cur.q;\n      vals.qStars = this.stars(cur.id);\n      vals.qAnswer = cur.a;\n      vals.qMore = cur.more;\n      vals.qHasMore = !!cur.more;\n      const isTest = qz.mode === \"test\";\n      const self = cur.dyn || isTest;\n      vals.isTest = isTest;\n      vals.tallyOk = qz.score;\n      vals.tallyNo = qz.missed.length;\n      vals.qIsChoice = !self;\n      vals.qIsSelf = self;\n      vals.selfHidden = self && !qz.revealed && !answered;\n      vals.selfShown = self && qz.revealed && !answered;\n      vals.onReveal = () => this.setState({ quiz: { ...qz, revealed: true } });\n      vals.onSelfYes = () => this.selfGrade(true);\n      vals.onSelfNo = () => this.selfGrade(false);\n      if (!self) {\n        vals.choices = item.choices.map((text) => {\n          let bg = \"#ffffff\", border = \"#e3dccb\", color = \"#1b2233\", mark = \"○\";\n          if (answered) {\n            if (text === cur.a) { bg = \"#e6f2ec\"; border = \"#2b6e4f\"; color = \"#20543c\"; mark = \"✓\"; }\n            else if (text === qz.picked) { bg = \"#f7e9e5\"; border = \"#b3542c\"; color = \"#8c3a2b\"; mark = \"✗\"; }\n            else { color = \"#a49a86\"; }\n          }\n          return { text, bg, border, color, mark, onPick: () => this.answer(text) };\n        });\n      }\n      vals.showFeedback = answered;\n      if (answered) {\n        const ok = qz.correct;\n        vals.fbBg = ok ? \"#e6f2ec\" : \"#f7e9e5\";\n        vals.fbBorder = ok ? \"#9cc7b2\" : \"#e0b7ab\";\n        vals.fbColor = ok ? \"#2b6e4f\" : \"#8c3a2b\";\n        vals.fbEmoji = ok ? \"🎉\" : \"💪\";\n        vals.fbTitle = ok ? \"Correct! +10 XP\" : \"Not quite — you'll get it next time\";\n        vals.fbDetail = ok ? (cur.more ? \"Also accepted: \" + cur.more : \"Locked in. \" + this.stars(cur.id) + \" toward mastery.\")\n                           : \"The answer is: \" + cur.a + (cur.more ? \" · Also accepted: \" + cur.more : \"\");\n        vals.nextLabel = qz.idx + 1 < qz.items.length ? \"Next question →\" : \"See results 🏁\";\n        vals.onNextQ = () => this.nextQ();\n      }\n    }\n\n    // RESULT\n    if (s.screen === \"result\" && s.quiz) {\n      const qz = s.quiz;\n      const pct = qz.score / qz.items.length;\n      vals.resXp = qz.xp;\n      if (qz.mode === \"test\") {\n        const wrong = qz.missed.length;\n        const passed = qz.score >= 12;\n        vals.resScore = qz.score + \"/\" + (qz.score + wrong);\n        vals.resEmoji = passed ? \"🏆\" : \"💪\";\n        vals.resTitle = passed ? \"You passed!\" : \"Not this time\";\n        vals.resSub = passed ? \"You reached 12 correct answers — in the real interview, the officer stops asking right there. You're ready.\" : \"Nine wrong answers ends the real test. Review the questions below and take it again — you've got this.\";\n      } else {\n      vals.resScore = qz.score + \"/\" + qz.items.length;\n      vals.resEmoji = pct === 1 ? \"🏆\" : pct >= 0.8 ? \"🎉\" : pct >= 0.6 ? \"💪\" : \"🌱\";\n      vals.resTitle = pct === 1 ? \"Perfect score!\" : pct >= 0.8 ? \"Great work!\" : pct >= 0.6 ? \"Solid progress!\" : \"Good start!\";\n      vals.resSub = pct >= 0.6 ? \"You need 12 of 20 to pass the real interview — you'd have passed this round.\" : \"You need 12 of 20 on the real test. Review the cards below and try again.\";\n      }\n      vals.missed = qz.missed.map((q) => ({ icon: q.icon, q: q.q, a: q.a }));\n      vals.hasMissed = qz.missed.length > 0;\n    }\n\n    return vals;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
